name: "Rerun Summary"

on:
  workflow_dispatch:
    inputs:
      CALL_TYPE:
        description: "Call series code (e.g. acde)"
        required: true
        type: string
      CALL_NUMBER:
        description: "Call number (e.g. 232)"
        required: true
        type: string
      WRITE_BACK:
        description: "Write generated tldr.json back to the branch"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  rerun-summary:
    runs-on: ubuntu-latest
    env:
      CALL_TYPE: ${{ inputs.CALL_TYPE }}
      CALL_NUMBER: ${{ inputs.CALL_NUMBER }}
      WRITE_BACK: ${{ inputs.WRITE_BACK }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e .github/ACDbot/
          pip install -r .github/ACDbot/requirements.txt

      - name: Locate call artifact
        id: locate
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          call_type = os.environ["CALL_TYPE"]
          call_number = int(os.environ["CALL_NUMBER"])
          artifacts_dir = Path(".github/ACDbot/artifacts") / call_type
          matches = sorted(artifacts_dir.glob(f"*_{call_number}"))

          if not matches:
              raise SystemExit(f"No artifact directory found for {call_type}/{call_number}")

          artifact_dir = matches[-1]
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              print(f"artifact_dir={artifact_dir}", file=f)
              print(f"call_id={artifact_dir.name}", file=f)
          PY

      - name: Copy artifact to scratch dir
        id: scratch
        run: |
          scratch_dir="$RUNNER_TEMP/${CALL_TYPE}_${CALL_NUMBER}_${GITHUB_RUN_ID}"
          cp -R "${{ steps.locate.outputs.artifact_dir }}" "$scratch_dir"
          echo "scratch_dir=$scratch_dir" >> "$GITHUB_OUTPUT"

      - name: Generate summary
        run: |
          python .github/ACDbot/scripts/asset_pipeline/generate_summary.py \
            --dir "${{ steps.scratch.outputs.scratch_dir }}" \
            --force

      - name: Scan regression spellings
        run: |
          echo "Regression scan for generated TLDR:"
          rg -n "Aragon|Lone Star|Prism|Taku|Netherland|Bezo|A3X|SSE/Pure ETH" \
            "${{ steps.scratch.outputs.scratch_dir }}/tldr.json" || true

      - name: Upload generated TLDR
        uses: actions/upload-artifact@v4
        with:
          name: tldr-${{ inputs.CALL_TYPE }}-${{ inputs.CALL_NUMBER }}-${{ github.run_number }}
          path: ${{ steps.scratch.outputs.scratch_dir }}/tldr.json
          if-no-files-found: error

      - name: Write generated TLDR back to branch
        if: inputs.WRITE_BACK
        run: |
          cp "${{ steps.scratch.outputs.scratch_dir }}/tldr.json" "${{ steps.locate.outputs.artifact_dir }}/tldr.json"
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add "${{ steps.locate.outputs.artifact_dir }}/tldr.json"
          if git diff --cached --quiet; then
            echo "No tldr.json changes to commit"
            exit 0
          fi
          git commit -m "rerun summary for $CALL_TYPE #$CALL_NUMBER"
          git push
